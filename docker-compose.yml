version: "3.9"

services:
  # ==========================================
  # API Gateway - Main entry point
  # ==========================================
  api-gateway:
    build: ./services/api_gateway
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./frontend/web:/app/static
      - ./data/logs:/app/logs
    depends_on:
      asr-service:
        condition: service_started
      tts-service:
        condition: service_started
      llm-service:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ==========================================
  # ASR Service - Speech to Text
  # ==========================================
  asr-service:
    build: ./services/asr_service
    ports:
      - "8001:8001"
    env_file:
      - .env
    volumes:
      - ./models/asr:/models/asr
      - ./data/audio_samples:/data/audio_samples
    deploy:
      resources:
        limits:
          memory: 4G
    restart: unless-stopped

  # ==========================================
  # LLM Service - Ollama Wrapper
  # Connects to Ollama running on host machine
  # ==========================================
  llm-service:
    build: ./services/llm_service
    ports:
      - "8003:8003"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ==========================================
  # TTS Service - Text to Speech
  # ==========================================
  tts-service:
    build: ./services/tts_service
    ports:
      - "8002:8002"
    env_file:
      - .env
    volumes:
      - ./models/tts:/models/tts
    restart: unless-stopped

  # ==========================================
  # Qdrant - Vector Database (Phase 2 - RAG)
  # ==========================================
  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    profiles:
      - rag
    restart: unless-stopped

  # ==========================================
  # Redis (Phase 2+ - Session/Queue)
  # ==========================================
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    profiles:
      - full
    restart: unless-stopped

  # ==========================================
  # PostgreSQL (Phase 2+ - Persistent Storage)
  # ==========================================
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_lab}
      POSTGRES_USER: ${POSTGRES_USER:-ai_lab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_lab_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    profiles:
      - full
    restart: unless-stopped

volumes:
  qdrant_data:
  postgres_data:
